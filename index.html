<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Claude Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #1e1e1e;
    --text: #e0e0e0;
    --text-dim: #666;
    --accent: #c96442;
    --accent-hover: #b55535;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── Header ── */
  .header {
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }

  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }

  .header-sub {
    font-size: 10px;
    color: var(--text-dim);
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .model-select {
    padding: 6px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 11px;
    outline: none;
    -webkit-appearance: none;
  }

  .btn-new {
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }

  .btn-new:active { background: #222; }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    scroll-behavior: smooth;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
  }

  .welcome h2 {
    font-size: 20px;
    color: #fff;
    margin-bottom: 6px;
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .welcome-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-width: 360px;
    margin: 0 auto;
  }

  .welcome-btn {
    padding: 14px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: #999;
    font-size: 12px;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s;
  }

  .welcome-btn:active { background: #1a1a1a; }

  .welcome-btn .icon {
    font-size: 18px;
    display: block;
    margin-bottom: 6px;
  }

  /* Message bubbles */
  .message {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    max-width: 100%;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    margin-top: 2px;
  }

  .av-user { background: var(--accent); color: #fff; }
  .av-ai { background: var(--surface); color: var(--accent); border: 1px solid var(--border); }

  .msg-body {
    flex: 1;
    min-width: 0;
  }

  .msg-sender {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 3px;
  }

  .msg-text {
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .msg-text p { margin-bottom: 8px; }
  .msg-text p:last-child { margin-bottom: 0; }
  .msg-text strong { color: #fff; }
  .msg-text h1, .msg-text h2, .msg-text h3 { color: #fff; margin: 10px 0 4px; }
  .msg-text h1 { font-size: 17px; }
  .msg-text h2 { font-size: 15px; }
  .msg-text h3 { font-size: 14px; }
  .msg-text ul, .msg-text ol { margin: 4px 0 8px 18px; }
  .msg-text li { margin-bottom: 3px; }
  .msg-text code {
    background: #1e1e1e;
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 12px;
    word-break: break-all;
  }
  .msg-text pre {
    background: #0a0a0a;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 6px 0;
    border: 1px solid var(--border);
    font-size: 12px;
  }
  .msg-text pre code { background: none; padding: 0; word-break: normal; }
  .msg-text hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .msg-text table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
  .msg-text th, .msg-text td { border: 1px solid #2a2a2a; padding: 5px 8px; text-align: left; }
  .msg-text th { background: var(--surface); color: #ccc; font-weight: 600; }

  /* Typing */
  .typing span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #555;
    margin-right: 3px;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* ── Input ── */
  .input-area {
    padding: 10px 12px calc(var(--safe-bottom) + 10px);
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    outline: none;
    line-height: 1.4;
  }

  .input-box:focus { border-color: var(--accent); }
  .input-box::placeholder { color: #444; }

  .send-btn {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .send-btn:active { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.3; }

  .attach-btn {
    width: 40px;
    height: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .attach-btn:active { background: #222; }

  #file-input, #camera-input { display: none; }

  .attachments-preview {
    display: flex;
    gap: 8px;
    padding: 0 12px;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .att-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 11px;
    color: #ccc;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .att-chip img {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    object-fit: cover;
  }

  .att-chip .remove {
    color: #666;
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
  }

  .att-chip .remove:active { color: #e84c4c; }

  .att-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: #1a2a1a;
    border: 1px solid #2a3a2a;
    border-radius: 6px;
    font-size: 10px;
    color: #6dba8a;
    margin-bottom: 6px;
    margin-right: 4px;
  }

  .att-badge img {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    object-fit: cover;
  }

  /* ── Connection bar ── */
  .conn-bar {
    display: none;
    padding: 6px 16px;
    background: #2a1515;
    color: #e84c4c;
    font-size: 11px;
    text-align: center;
    flex-shrink: 0;
  }
  .conn-bar.show { display: block; }
</style>
</head>
<body>

<div class="app">
  <div class="conn-bar" id="conn-bar">Connection lost. Retrying...</div>

  <div class="header">
    <div class="header-left">
      <div class="header-logo">C</div>
      <div>
        <div class="header-title">Claude Chat</div>
        <div class="header-sub">Anduril Australia</div>
      </div>
    </div>
    <div class="header-actions">
      <select class="model-select" id="model-select">
        <option value="us.anthropic.claude-sonnet-4-6">Sonnet</option>
        <option value="us.anthropic.claude-haiku-4-5-20251001">Haiku</option>
      </select>
      <button class="btn-new" onclick="newChat()" title="New chat">+</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Claude Chat</h2>
      <p>AI assistant on the go</p>
      <div class="welcome-grid">
        <div class="welcome-btn" onclick="ask('Draft a shipment status update email')">
          <span class="icon">&#9992;</span> Draft email
        </div>
        <div class="welcome-btn" onclick="ask('Help me plan my tasks for this week')">
          <span class="icon">&#9745;</span> Weekly plan
        </div>
        <div class="welcome-btn" onclick="ask('Summarize the key freight risks this week')">
          <span class="icon">&#9888;</span> Risk summary
        </div>
        <div class="welcome-btn" onclick="ask('Write a brief for a transport provider')">
          <span class="icon">&#128666;</span> Transport brief
        </div>
      </div>
    </div>
  </div>

  <div class="attachments-preview" id="att-preview"></div>
  <div class="input-area">
    <div class="input-row">
      <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file">&#128206;</button>
      <button class="attach-btn" onclick="document.getElementById('camera-input').click()" title="Take photo">&#128247;</button>
      <input type="file" id="file-input" multiple accept="image/*,.pdf" onchange="handleFiles(this.files)">
      <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFiles(this.files)">
      <textarea class="input-box" id="user-input" placeholder="Message Claude..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">&#9654;</button>
    </div>
  </div>
</div>

<script>
let chatHistory = [];
let pendingAttachments = [];

async function handleFiles(fileList) {
  for (const file of fileList) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      // Build a local preview URL
      data._preview = URL.createObjectURL(file);
      data._isImage = file.type.startsWith('image/');
      pendingAttachments.push(data);
    } catch (e) {
      console.error('Upload failed:', e);
    }
  }
  renderAttachmentPreview();
  document.getElementById('file-input').value = '';
}

function renderAttachmentPreview() {
  const container = document.getElementById('att-preview');
  if (!pendingAttachments.length) { container.innerHTML = ''; return; }
  container.innerHTML = pendingAttachments.map((a, i) => `
    <div class="att-chip">
      ${a._isImage ? `<img src="${a._preview}" alt="">` : '&#128196;'}
      <span>${a.filename.length > 18 ? a.filename.slice(0, 15) + '...' : a.filename}</span>
      <span class="remove" onclick="removeAttachment(${i})">&times;</span>
    </div>
  `).join('');
}

function removeAttachment(idx) {
  URL.revokeObjectURL(pendingAttachments[idx]._preview);
  pendingAttachments.splice(idx, 1);
  renderAttachmentPreview();
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, content, attachments) {
  const msgs = document.getElementById('messages');
  const w = document.getElementById('welcome');
  if (w) w.remove();

  let attHtml = '';
  if (attachments && attachments.length) {
    attHtml = attachments.map(a =>
      `<span class="att-badge">${a._isImage ? `<img src="${a._preview}" alt="">` : '&#128196;'} ${a.filename}</span>`
    ).join('');
  }

  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `
    <div class="msg-avatar ${role === 'user' ? 'av-user' : 'av-ai'}">${role === 'user' ? 'A' : 'C'}</div>
    <div class="msg-body">
      <div class="msg-sender">${role === 'user' ? 'You' : 'Claude'}</div>
      ${attHtml}
      <div class="msg-text">${role === 'user' ? content.replace(/\n/g, '<br>') : renderMarkdown(content)}</div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar av-ai">C</div>
    <div class="msg-body">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  // Grab current attachments and clear
  const atts = [...pendingAttachments];
  pendingAttachments = [];
  renderAttachmentPreview();

  addMessage('user', text, atts);
  chatHistory.push({ role: 'user', content: text });

  showTyping();
  document.getElementById('send-btn').disabled = true;

  // Build attachment payload (base64, no preview blobs)
  const attPayload = atts.map(a => ({
    filename: a.filename,
    content_type: a.content_type,
    base64: a.base64,
  }));

  try {
    const model = document.getElementById('model-select').value;
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory.slice(-20), model, attachments: attPayload })
    });

    const data = await res.json();
    hideTyping();
    document.getElementById('conn-bar').classList.remove('show');

    const reply = data.response || data.error || 'No response';
    addMessage('assistant', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    document.getElementById('conn-bar').classList.add('show');
    addMessage('assistant', 'Connection error. Check your network.');
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function ask(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function newChat() {
  chatHistory = [];
  document.getElementById('messages').innerHTML = `
    <div class="welcome" id="welcome">
      <h2>Claude Chat</h2>
      <p>AI assistant on the go</p>
      <div class="welcome-grid">
        <div class="welcome-btn" onclick="ask('Draft a shipment status update email')">
          <span class="icon">&#9992;</span> Draft email
        </div>
        <div class="welcome-btn" onclick="ask('Help me plan my tasks for this week')">
          <span class="icon">&#9745;</span> Weekly plan
        </div>
        <div class="welcome-btn" onclick="ask('Summarize the key freight risks this week')">
          <span class="icon">&#9888;</span> Risk summary
        </div>
        <div class="welcome-btn" onclick="ask('Write a brief for a transport provider')">
          <span class="icon">&#128666;</span> Transport brief
        </div>
      </div>
    </div>
  `;
}

// Auto-resize textarea
const input = document.getElementById('user-input');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// Health check
async function checkHealth() {
  try {
    const r = await fetch('/health', { signal: AbortSignal.timeout(5000) });
    if (r.ok) document.getElementById('conn-bar').classList.remove('show');
    else document.getElementById('conn-bar').classList.add('show');
  } catch {
    document.getElementById('conn-bar').classList.add('show');
  }
}
setInterval(checkHealth, 30000);
</script>
</body>
</html>
